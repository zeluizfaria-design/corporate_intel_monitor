name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:run

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install backend test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn duckdb pydantic-settings python-dotenv httpx pdfplumber selectolax feedparser

      - name: Run backend tests
        run: python -m unittest tests.test_base_collector_resilience tests.test_api_integration tests.test_api_background_tasks -v
